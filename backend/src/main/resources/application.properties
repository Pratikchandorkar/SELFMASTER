spring.application.name=Self-improvement

# ---- Server ----
server.port=8080
server.servlet.context-path=/

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/selfimprovementdb?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ---- JWT ----
app.jwt.secret=Self-improvementAI2024SuperSecretKeyForJWTTokenGenerationAndValidation256Bit!!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ---- OpenAI ----
app.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
app.openai.model=gpt-4o-mini
app.openai.max-tokens=2000
app.openai.temperature=0.7
app.openai.base-url=https://api.openai.com/v1

# ---- Email (SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Logging ----
logging.level.com.selfmaster=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
