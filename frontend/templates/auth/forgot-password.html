<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Self-improvement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="/" class="navbar-brand" style="justify-content: center; margin-bottom: 24px;">
                <i class="fas fa-compass"></i>
                <span>Self-<span class="text-gradient">improvement</span></span>
            </a>
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email and we'll send you a password reset link</p>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Error message</span>
            </div>

            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}">Success message</span>
            </div>

            <form th:action="@{/auth/forgot-password}" method="post">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" th:value="${email}" 
                           placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px;">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <p class="auth-divider">Or go back to</p>
            <a th:href="@{/auth/login}" class="btn btn-outline btn-full">Sign In</a>
        </div>
    </div>
</body>
</html>
